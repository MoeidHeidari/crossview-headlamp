name: Release Headlamp Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run tsc

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: npm run package

      - name: Verify package artifact
        run: |
          ls -la
          test -n "$(ls -1 *.tar.gz 2>/dev/null)"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossview-headlamp-package
          path: "*.tar.gz"
          if-no-files-found: error

      - name: Create GitHub release and upload package
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
