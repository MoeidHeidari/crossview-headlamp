name: Release Headlamp Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.1.1)"
        required: false
        type: string
      release_type:
        description: "Version bump type when release_tag is empty"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve release mode
        id: release_meta
        run: |
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          INPUT_TYPE="${{ github.event.inputs.release_type }}"

          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP_TYPE="${INPUT_TYPE:-patch}"
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"
          NEW_TAG="v$NEW_VERSION"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push bumped version
        if: steps.release_meta.outputs.bump == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.release_meta.outputs.tag }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run tsc

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: npm run package

      - name: Verify package artifact
        id: package_artifact
        run: |
          ls -la
          ARTIFACT="$(ls -1 *.tar.gz 2>/dev/null | head -n 1)"
          test -n "$ARTIFACT"
          echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossview-headlamp-package
          path: ${{ steps.package_artifact.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub release and upload package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag || github.ref_name }}
          target_commitish: ${{ github.ref_name }}
          files: ${{ steps.package_artifact.outputs.path }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
