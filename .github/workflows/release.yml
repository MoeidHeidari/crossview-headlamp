name: Release Headlamp Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.1.1)"
        required: false
        type: string
      release_type:
        description: "Version bump type when release_tag is empty"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve release mode
        id: release_meta
        run: |
          EVENT_NAME="${{ github.event_name }}"
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          INPUT_TYPE="${{ github.event.inputs.release_type }}"

          if [ -n "$INPUT_TAG" ]; then
            case "$INPUT_TAG" in
              v*) TAG="$INPUT_TAG" ;;
              *) TAG="v$INPUT_TAG" ;;
            esac
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP_TYPE="${INPUT_TYPE:-patch}"
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION="$(node -p "require('./package.json').version")"
          NEW_TAG="v$NEW_VERSION"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run tsc

      - name: Build plugin
        run: npm run build

      - name: Clean old package artifacts
        run: rm -f *.tar.gz *.tgz

      - name: Package plugin
        run: npm run package

      - name: Verify package artifact
        id: package_artifact
        run: |
          ls -la
          ARTIFACT="$(ls -1 *.tar.gz 2>/dev/null | head -n 1)"
          test -n "$ARTIFACT"
          echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Update artifacthub-pkg.yml with release metadata
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.release_meta.outputs.tag }}"
          VERSION="${TAG#v}"
          ARTIFACT="${{ steps.package_artifact.outputs.path }}"
          CHECKSUM="sha256:$(sha256sum "$ARTIFACT" | awk '{print $1}')"
          ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ARTIFACT}"

          sed -i "s|^version:.*|version: ${VERSION}|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-url:.*|headlamp/plugin/archive-url: ${ARCHIVE_URL}|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-checksum:.*|headlamp/plugin/archive-checksum: ${CHECKSUM}|" artifacthub-pkg.yml

      - name: Check metadata changes
        if: github.event_name == 'workflow_dispatch'
        id: metadata_changes
        run: |
          if git diff --quiet artifacthub-pkg.yml package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create metadata update PR
        id: metadata_pr
        if: github.event_name == 'workflow_dispatch' && steps.metadata_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): sync release metadata for ${{ steps.release_meta.outputs.tag }}"
          title: "chore(release): sync release metadata for ${{ steps.release_meta.outputs.tag }}"
          body: |
            Automated release metadata update for `${{ steps.release_meta.outputs.tag }}`.
            - Updates `artifacthub-pkg.yml` version
            - Sets `headlamp/plugin/archive-url`
            - Sets `headlamp/plugin/archive-checksum`
            - Includes `package.json`/`package-lock.json` when version bump mode is used
          branch: "chore/release-artifacthub-${{ steps.release_meta.outputs.tag }}"
          base: main
          delete-branch: true
          add-paths: |
            artifacthub-pkg.yml
            package.json
            package-lock.json

      - name: Enable auto-merge for metadata PR
        if: github.event_name == 'workflow_dispatch' && steps.metadata_changes.outputs.changed == 'true' && steps.metadata_pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.metadata_pr.outputs.pull-request-number }}
          merge-method: squash

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossview-headlamp-package
          path: ${{ steps.package_artifact.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub release and upload package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.package_artifact.outputs.path }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
